<!DOCTYPE html>
<html lang="ru" class="bg-black text-white antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель Организатора | Олотау</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white">

    <div id="olotau-app" class="p-4 max-w-5xl mx-auto px-4 pb-32">
        <div class="flex items-center justify-between border-b border-zinc-800 pb-3 mb-4">
            <div>
                <h1 class="text-base font-black uppercase tracking-wider text-neon">Панель управления</h1>
                <p class="text-[9px] text-zinc-500 font-bold uppercase">Ввод данных в реальном времени с телефона</p>
            </div>
            <a href="index.html" class="px-3 py-1.5 rounded-xl bg-zinc-900 border border-zinc-800 text-[10px] font-black uppercase text-zinc-400 hover:text-white">На сайт</a>
        </div>

        <div id="admin-loader" class="text-center py-10 text-xs text-zinc-500 uppercase font-black">Загрузка структуры таблиц...</div>

        <div id="admin-content" class="hidden">
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="admin-build-grid-btn" onclick="triggerBuildGrid()" class="p-3 bg-neon text-black font-black uppercase text-[10px] rounded-2xl tracking-wider shadow-lg">Построить сетку плей-офф</button>
                <button onclick="triggerClearAllData()" class="p-3 bg-red-600/10 border border-red-500/30 text-red-500 font-black uppercase text-[10px] rounded-2xl tracking-wider">Стереть всю БД 2026</button>
            </div>

            <div id="admin-loat-notification" class="hidden flex flex-col gap-3 p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-2xl mb-6">
                <div class="text-[11px] font-black uppercase text-yellow-500 tracking-wide">⚠️ ТРЕБУЕТСЯ ЖРЕБИЙ ДЛЯ СОРТИРОВКИ</div>
                <div id="admin-loat-list" class="flex flex-col gap-4"></div>
            </div>

            <div class="flex bg-zinc-900/40 border border-zinc-800/60 p-1.5 rounded-2xl mb-4 gap-1">
                <button id="admin-tab-btn-group" onclick="switchAdminTab('group')" class="flex-1 py-2 text-[10px] font-black uppercase text-center rounded-xl bg-white text-black">Групповой этап</button>
                <button id="admin-tab-btn-playoff" onclick="switchAdminTab('playoff')" class="flex-grow py-2 text-[10px] font-black uppercase text-center rounded-xl text-zinc-400">Плей-офф сетка</button>
            </div>

            <div id="admin-matches-container" class="flex flex-col gap-4"></div>
        </div>
    </div>

    <script src="parser.js"></script>
    <script src="admin.js"></script>
</body>
</html>
